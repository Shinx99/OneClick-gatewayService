# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: ${SERVER_PORT:8080}


# ============================================
# SPRING CONFIGURATION
# ============================================
spring:
  application:
    name: ${APP_NAME:gateway-service}

  cloud:
    compatibility-verifier:
      enabled: false

    gateway:
      default-filters:

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGINS:*}"
#            allowedOriginPatterns: ["http://localhost:*"]
            allowedMethods: ["GET","POST","PUT","DELETE","OPTIONS","PATCH"]
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        # AUTH SERVICE PUBLIC
        - id: authService-be
          uri: lb://authService-be
#          uri:  http://authService-be-app:8080
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: ${GATEWAY_AUTH_REPLENISH_RATE:1000}
                redis-rate-limiter.burstCapacity: ${GATEWAY_AUTH_BURST_CAPACITY:2000}
                redis-rate-limiter.requestedTokens: 1
            - PreserveHostHeader
            - DedupeResponseHeader=Set-Cookie Access-Control-Allow-Origin

        # CV/JOB SERVICE
        - id: recruitmentService-be
          uri: lb://recruitmentService-be
#          uri: http://recruitmentService-be-app:8080
          predicates:
            - Path=/api/recruitment/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${GATEWAY_CV_REPLENISH_RATE:1000}
                redis-rate-limiter.burstCapacity: ${GATEWAY_CV_BURST_CAPACITY:2000}

        # SOCIAL SERVICE
        - id: social-service
          uri: http://socialService-app:8080
          predicates:
            - Path=/social/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${GATEWAY_SOCIAL_REPLENISH_RATE:300}
                redis-rate-limiter.burstCapacity: ${GATEWAY_SOCIAL_BURST_CAPACITY:1000}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:gateway-redis}
      port: ${SPRING_REDIS_PORT:6379}


  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://authService-be-app:8080/oauth2/jwks


# ============================================
# ACTUATOR (Corrected metrics path)
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  health:
    redis:
      enabled: false


# ============================================
# LOGGING
# ============================================
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.springframework.cloud.gateway: DEBUG


