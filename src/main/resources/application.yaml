# ============================================
# SERVER CONFIGURATION
# ============================================
server:
  port: ${SERVER_PORT:8080}

# ============================================
# SPRING CONFIGURATION
# ============================================
spring:
  application:
    name: ${APP_NAME:gateway-service}

  # Tăng buffer size cho multipart upload (default 256KB → 10MB)
  codec:
    max-in-memory-size: 10MB

  cloud:
    compatibility-verifier:
      enabled: false
    loadbalancer:
      logging:
        enabled: true
    gateway:
      # Cho phép multipart/form-data forwarding (upload ảnh company logo/background)
      streaming-media-types:
        - multipart/form-data
        - application/octet-stream
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Vary, RETAIN_FIRST

      routes:
        # AUTH SERVICE PUBLIC
        - id: authService-be
          uri: lb://authService-be
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: ${GATEWAY_AUTH_REPLENISH_RATE:1000}
                redis-rate-limiter.burstCapacity: ${GATEWAY_AUTH_BURST_CAPACITY:2000}
                redis-rate-limiter.requestedTokens: 1
            - PreserveHostHeader
            - DedupeResponseHeader=Set-Cookie Access-Control-Allow-Origin

        # WEBSOCKET / SOCKJS - Dùng HTTP upgrade
        - id: recruitmentService-ws
          uri: lb://recruitmentService-be
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=0
            - name: WebSocketTokenRelayFilter
          metadata:
            response-timeout: 600000
            connect-timeout: 600000

        # RECRUITMENT SERVICE - HTTP API
        - id: recruitmentService-be
          uri: lb://recruitmentService-be
          predicates:
            - Path=/api/recruitment/**, /api/chatbot/**, /api/profile/**, /api/internal/**, /api/admin/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${GATEWAY_CV_REPLENISH_RATE:1000}
                redis-rate-limiter.burstCapacity: ${GATEWAY_CV_BURST_CAPACITY:2000}

        # SOCIAL SERVICE
        - id: socialService-be
          uri: lb://socialService-be
          predicates:
            - Path=/social/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: ${GATEWAY_SOCIAL_REPLENISH_RATE:1000}
                redis-rate-limiter.burstCapacity: ${GATEWAY_SOCIAL_BURST_CAPACITY:1000}

  data:
    redis:
      host: ${SPRING_REDIS_HOST:gateway-redis}
      port: ${SPRING_REDIS_PORT:6379}

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://authService-be-app:8080/oauth2/jwks

# ============================================
# ACTUATOR
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics
  health:
    redis:
      enabled: false

# ============================================
# LOGGING
# ============================================
logging:
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.springframework.cloud.gateway: DEBUG

# ============================================
# EUREKA CLIENT
# ============================================
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://eureka-server:8761/eureka/}
    enabled: true
  instance:
    prefer-ip-address: true